<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============================================================================
//  场景基础配置（性能优化版）
// ============================================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color('#050210');
scene.fog = new THREE.FogExp2('#050210', 0.00015);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0.8, 7.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
// 限制最大像素比，大幅提升移动端性能
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.6;
document.body.appendChild(renderer.domElement);

// 后处理效果增强（更柔和的光晕+层次感）
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.6, 0.5, 0.5
);
bloomPass.threshold = 0.82;
bloomPass.strength = 0.12;
bloomPass.radius = 0.25;
composer.addPass(bloomPass);

// 轨道控制器优化
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
controls.minDistance = 3.5;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.72;
controls.target.set(0, 0.05, 0);
controls.update();

// ============================================================================
//  灯光系统升级（水晶质感核心）
// ============================================================================
scene.add(new THREE.AmbientLight('#1a0e14', 1.2));

const keyLight = new THREE.DirectionalLight('#fff5f0', 8);
keyLight.position.set(6, 5, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 512;
keyLight.shadow.mapSize.height = 512;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 30;
keyLight.shadow.camera.left = -6;
keyLight.shadow.camera.right = 6;
keyLight.shadow.camera.top = 6;
keyLight.shadow.camera.bottom = -6;
keyLight.shadow.bias = -0.0001;
keyLight.shadow.normalBias = 0.02;
scene.add(keyLight);

// 添加镜头光晕，增强水晶光泽

const fillLight = new THREE.DirectionalLight('#e8d0f0', 6);
fillLight.position.set(-4, 2, 3);
scene.add(fillLight);

const spotLight = new THREE.SpotLight('#ffd0e8', 32, 14, Math.PI / 6, 0.3, 0.5);
spotLight.position.set(-2, 3.5, -5);
spotLight.castShadow = true;
spotLight.shadow.mapSize.width = 512;
spotLight.shadow.mapSize.height = 512;
spotLight.shadow.bias = -0.0001;
scene.add(spotLight);

const bottomLight = new THREE.PointLight('#6030a0', 5, 7);
bottomLight.position.set(0, -3.5, 1);
scene.add(bottomLight);

// 花心补光（增强水晶通透感）
const centerLight = new THREE.PointLight('#ffb0c8', 0.8, 1.0);
centerLight.position.set(0, -0.05, 0);
scene.add(centerLight);

// ============================================================================
//  纹理生成
// ============================================================================
function makeGradientTex(inner, outer) {
  const w = 128, h = 256;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, inner); grad.addColorStop(0.3, inner);
  grad.addColorStop(0.65, outer); grad.addColorStop(0.9, outer);
  grad.addColorStop(1, '#ffe8ec');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
  const img = ctx.getImageData(0, 0, w, h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const d = 1 - Math.abs(x - w / 2) / (w / 2) * 0.15;
      img.data[i] = Math.round(img.data[i] * d);
      img.data[i + 1] = Math.round(img.data[i + 1] * d);
      img.data[i + 2] = Math.round(img.data[i + 2] * d);
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = true;
  return tex;
}
const texBud   = makeGradientTex('#7a1020', '#c04050');
const texInner = makeGradientTex('#8b1530', '#d05060');
const texMid   = makeGradientTex('#a02040', '#e87080');
const texOuter = makeGradientTex('#b03050', '#f090a0');
const texEdge  = makeGradientTex('#c04060', '#f8b0c0');

function makeLeafTex() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, c.height);
  g.addColorStop(0, '#2d5a2d'); g.addColorStop(0.5, '#3a7030'); g.addColorStop(1, '#2d5a2d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, c.width, c.height);
  ctx.strokeStyle = '#1a4018'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(128, 0); ctx.lineTo(128, 512); ctx.stroke();
  ctx.lineWidth = 1.5;
  for (let y = 80; y < 460; y += 60) {
    const off = 15 + Math.sin((y / 512) * Math.PI) * 80;
    ctx.beginPath(); ctx.moveTo(128, y);
    ctx.quadraticCurveTo(128 - off * 0.5, y + 20, 128 - off, y + 15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(128, y);
    ctx.quadraticCurveTo(128 + off * 0.5, y + 20, 128 + off, y + 15); ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = true;
  return tex;
}
const leafTex = makeLeafTex();

// ============================================================================
//  花瓣几何与材质（真实玫瑰花瓣形态）
// ============================================================================

// 玫瑰花瓣轮廓：宽圆头、微心形基部
function petalShape(w, h) {
  const s = new THREE.Shape(), hw = w / 2;
  s.moveTo(0, 0);
  // 左侧
  s.bezierCurveTo(
    hw * 0.35, h * 0.04,
    hw * 0.82, h * 0.15,
    hw * 0.98, h * 0.32
  );
  s.bezierCurveTo(
    hw * 1.08, h * 0.48,
    hw * 1.04, h * 0.58,
    hw * 0.88, h * 0.72
  );
  s.bezierCurveTo(
    hw * 0.62, h * 0.89,
    hw * 0.22, h * 0.97,
    0, h
  );
  // 右侧
  s.bezierCurveTo(
    -hw * 0.22, h * 0.97,
    -hw * 0.62, h * 0.89,
    -hw * 0.88, h * 0.72
  );
  s.bezierCurveTo(
    -hw * 1.04, h * 0.58,
    -hw * 1.08, h * 0.48,
    -hw * 0.98, h * 0.32
  );
  s.bezierCurveTo(
    -hw * 0.82, h * 0.15,
    -hw * 0.35, h * 0.04,
    0, 0
  );
  return s;
}

// 花瓣3D变形：中央折痕 + 勺形凹陷 + 多层边缘皱褶
function petalGeometry(w, h, curlTip, cupDepth, foldStr, waveAmp, seg) {
  const shape = petalShape(w, h);
  const geom = new THREE.ShapeGeometry(shape, seg + 4);
  const pos = geom.attributes.position;
  let yMin = Infinity, yMax = -Infinity;
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    if (y < yMin) yMin = y; if (y > yMax) yMax = y;
  }
  const yr = yMax - yMin || 1;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i);
    const u = (y - yMin) / yr;
    const v = x / (w / 2);
    const av = Math.abs(v);

    // 勺形横向凹陷
    const spoon = cupDepth * v * v * (1.0 - u * 0.35);

    // 顶端向外翻卷
    const tipCurl = curlTip * Math.pow(Math.max(0, u - 0.22), 2.2)
                  * (1.0 + 0.15 * av);

    // 中央主脉折痕
    const crease = foldStr * av * (1.0 - u * 0.5)
                 * (1.0 - 0.25 * Math.exp(-av * av * 8));

    // 三层波纹叠加模拟自然皱褶
    const r1 = waveAmp * Math.sin(v * Math.PI * 5.5 + u * 1.2)
             * u * (1.0 - u * 0.2);
    const r2 = waveAmp * 0.6 * Math.cos(v * Math.PI * 8.2 - u * 0.8)
             * u * Math.pow(u, 0.6);
    const r3 = waveAmp * 0.35 * Math.sin(v * Math.PI * 13.0 + u * 2.5)
             * Math.pow(u, 1.5);

    // 基部渐变压窄
    const px = u < 0.06
      ? x * (0.55 + 0.45 * (u / 0.06))
      : x;

    const z = spoon + tipCurl + crease + r1 + r2 + r3;
    pos.setXYZ(i, px, y, z);
  }
  geom.computeVertexNormals();
  return geom;
}

// 水晶材质核心参数（添加透射、色散、折射率）
function petalMaterial(tex, opacity) {
  return new THREE.MeshPhysicalMaterial({
    map: tex, color: new THREE.Color('#ffffff'),
    roughness: 0.2, metalness: 0.0,
    clearcoat: 0.45, clearcoatRoughness: 0.1,
    specularIntensity: 0.7, specularColor: new THREE.Color('#ffffff'),
    sheen: 0.35, sheenRoughness: 0.15, sheenColor: new THREE.Color('#ffd0e0'),
    // 水晶折射效果关键参数
    transmission: 0.08, ior: 1.45, dispersion: 0.05,
    transparent: true, opacity, side: THREE.DoubleSide, depthWrite: true,
  });
}

// ============================================================================
//  构建玫瑰
// ============================================================================
const rose = new THREE.Group();
const PHI = Math.PI * (3 - Math.sqrt(5));
const allPetals = [];
const TOTAL = 70;

function remap(t, a, b, c, d) { return c + (t - a) / (b - a) * (d - c); }

for (let i = 0; i < TOTAL; i++) {
  const t = i / TOTAL;
  const angle = i * PHI;

  const yBase = remap(t, 0, 1, -0.05, -0.18);
  const pw = remap(t, 0, 1, 0.14, 0.72);
  const ph = remap(t, 0, 1, 0.36, 1.15);

  const tiltRaw = remap(t, 0, 1, 0, 1);
  const tiltClosed = 0.25 + tiltRaw * tiltRaw * 0.45;
  const tiltOpen   = 0.35 + Math.pow(tiltRaw, 1.4) * 1.65;

  const curl = remap(t, 0, 1, 0.03, 0.80);
  const cup  = remap(t, 0, 1, 0.10, 0.05);
  const fold = remap(t, 0, 1, 0.025, 0.014);
  const wave = remap(t, 0, 1, 0.005, 0.018);

  let tex;
  if (t < 0.12) tex = texBud;
  else if (t < 0.3) tex = texInner;
  else if (t < 0.55) tex = texMid;
  else if (t < 0.78) tex = texOuter;
  else tex = texEdge;

  const opacity = remap(t, 0, 1, 0.85, 0.58);
  const seg = Math.round(remap(t, 0, 1, 8, 12));
  const bloomDelay = remap(t, 0, 1, 2.2, 0.0);

  const geom = petalGeometry(pw, ph, curl, cup, fold, wave, seg);
  const mat = petalMaterial(tex, opacity);
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true; mesh.receiveShadow = true;
  mesh.name = 'petal';

  const pivot = new THREE.Group();
  // 根部固定在 pivot 原点
  mesh.position.y = 0;
  pivot.add(mesh);
  pivot.position.set(0, yBase, 0);
  // 先绕世界X轴向上倾斜，再绕世界Y轴分布
  const qTilt = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), tiltClosed);
  const qDist = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), angle);
  pivot.quaternion.multiplyQuaternions(qDist, qTilt);

  rose.add(pivot);
  allPetals.push({
    pivot, mesh, angle,
    tiltClosed, tiltOpen,
    currentTilt: tiltClosed,
    tiltTarget: tiltOpen,
    tiltAnimStart: 0,
    tiltAnimDuration: 0,
    tiltAnimFrom: 0,
    tiltAnimTo: 0,
    yBase,
    bloomDelay: bloomDelay + Math.random() * 0.2,
    swayPhase: Math.random() * Math.PI * 2,
    swayAmp: 0.002 + Math.random() * 0.005,
    swayNoiseOff: Math.random() * 100,
    removed: false,
    t,
  });
}

// 花托与花萼
const receptacleGeom = new THREE.SphereGeometry(0.16, 24, 16, 0, Math.PI * 2, 0, Math.PI * 0.55);
const receptacleMat = new THREE.MeshStandardMaterial({ color: '#3a6830', roughness: 0.5, metalness: 0.05 });
const receptacle = new THREE.Mesh(receptacleGeom, receptacleMat);
receptacle.position.y = -0.26; receptacle.scale.set(1, 0.7, 1);
receptacle.castShadow = true; receptacle.receiveShadow = true;
rose.add(receptacle);

// 戒指（藏在花瓣基部下方）
const ringGroup = new THREE.Group();
// 戒环
const ringBandGeom = new THREE.TorusGeometry(0.16, 0.022, 16, 48);
const ringBandMat = new THREE.MeshStandardMaterial({ color: '#e8c4a0', roughness: 0.25, metalness: 0.9 });
const ringBand = new THREE.Mesh(ringBandGeom, ringBandMat);
ringBand.rotation.x = Math.PI / 2;
ringGroup.add(ringBand);
// 钻石
const diamondGeom = new THREE.OctahedronGeometry(0.04, 0);
const diamondMat = new THREE.MeshPhysicalMaterial({
  color: '#ffffff', roughness: 0.08, metalness: 0.0,
  clearcoat: 0.3, specularIntensity: 0.8,
  transmission: 0.15, ior: 2.4,
});
const diamond = new THREE.Mesh(diamondGeom, diamondMat);
diamond.position.set(0, 0.042, 0.16);
diamond.scale.set(1, 1.4, 1);
ringGroup.add(diamond);
ringGroup.position.y = -0.15;
ringGroup.rotation.y = Math.PI * 0.25;
rose.add(ringGroup);

scene.add(rose);

// 花茎与刺
const stemCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, -0.31, 0),
  new THREE.Vector3(0.06, -0.78, 0.04),
  new THREE.Vector3(-0.04, -1.35, -0.03),
  new THREE.Vector3(0.03, -1.95, 0.02),
  new THREE.Vector3(0, -2.8, 0),
]);
const stemTube = new THREE.TubeGeometry(stemCurve, 50, 0.045, 12, false);
const stemMat = new THREE.MeshStandardMaterial({ color: '#3a6a30', roughness: 0.55, metalness: 0.05 });
const stem = new THREE.Mesh(stemTube, stemMat);
stem.castShadow = true; stem.receiveShadow = true;
rose.add(stem);

for (let i = 0; i < 5; i++) {
  const thornGeom = new THREE.ConeGeometry(0.016, 0.1, 6, 4);
  const thorn = new THREE.Mesh(thornGeom, stemMat);
  const pt = stemCurve.getPointAt(0.2 + i * 0.16);
  thorn.position.copy(pt);
  thorn.rotation.z = (i % 2 === 0 ? 0.5 : -0.5);
  thorn.rotation.x = (i % 3 === 0 ? 0.2 : -0.2);
  thorn.castShadow = true;
  rose.add(thorn);
}

// 叶子
function createLeaf(w, h, stemT, rx, ry, rz) {
  const shape = new THREE.Shape(), hw = w / 2;
  shape.moveTo(0, 0);
  shape.bezierCurveTo(hw*0.7, h*0.15, hw*0.95, h*0.35, hw*0.8, h*0.65);
  shape.bezierCurveTo(hw*0.5, h*0.88, hw*0.1, h*0.98, 0, h);
  shape.bezierCurveTo(-hw*0.1, h*0.98, -hw*0.5, h*0.88, -hw*0.8, h*0.65);
  shape.bezierCurveTo(-hw*0.95, h*0.35, -hw*0.7, h*0.15, 0, 0);
  const geom = new THREE.ShapeGeometry(shape, 14);
  const pos = geom.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i);
    pos.setZ(i, 0.04 * Math.abs(x/(w/2)) * (y/h) + 0.03 * (x/(w/2))*(x/(w/2)) * (1-y/h));
  }
  geom.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ map: leafTex, color:'#ffffff', roughness:0.5, metalness:0.02, side:THREE.DoubleSide });
  const leaf = new THREE.Mesh(geom, mat);
  leaf.position.copy(stemCurve.getPointAt(stemT));
  leaf.rotation.set(rx, ry, rz);
  leaf.castShadow = true; leaf.receiveShadow = true;
  return leaf;
}
rose.add(createLeaf(0.22, 0.65, 0.35, -0.7, 0.6, 0.3));
rose.add(createLeaf(0.25, 0.75, 0.5, -0.55, 2.4, -0.25));
rose.add(createLeaf(0.22, 0.6, 0.62, -0.65, -1.8, 0.2));

// 发光花蕊
const stamenGroup = new THREE.Group();
stamenGroup.position.y = -0.10;
const filamentMat = new THREE.MeshStandardMaterial({ color:'#e8d080', roughness:0.4, metalness:0.1 });
const antherMat = new THREE.MeshStandardMaterial({ 
  color:'#f0c040', roughness:0.3, metalness:0.2, 
  emissive:'#502800', emissiveIntensity:0.5 
});
for (let i = 0; i < 55; i++) {
  const fg = new THREE.CylinderGeometry(0.003, 0.005, 0.16, 6);
  const filament = new THREE.Mesh(fg, filamentMat);
  const theta = Math.random() * Math.PI * 2;
  const phi = 0.05 + Math.random() * 0.35;
  filament.position.set(Math.cos(theta)*Math.sin(phi)*0.1, Math.cos(phi)*0.06, Math.sin(theta)*Math.sin(phi)*0.1);
  filament.rotation.z = phi; filament.rotation.y = theta;
  stamenGroup.add(filament);
  const anther = new THREE.Mesh(new THREE.SphereGeometry(0.008, 4, 4), antherMat);
  anther.position.copy(filament.position); anther.position.y += 0.08;
  stamenGroup.add(anther);
}
rose.add(stamenGroup);

// 中心点击目标
const centerTarget = new THREE.Mesh(
  new THREE.SphereGeometry(0.18, 8, 8),
  new THREE.MeshBasicMaterial({ visible: false })
);
centerTarget.position.y = -0.05;
centerTarget.name = 'center';
rose.add(centerTarget);

// ============================================================================
//  地面动态发光
// ============================================================================
const glowGeom = new THREE.PlaneGeometry(10, 10);
const glowMat = new THREE.ShaderMaterial({
  uniforms: { uTime:{value:0}, uC1:{value:new THREE.Color('#702090')}, uC2:{value:new THREE.Color('#301050')} },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `varying vec2 vUv; uniform float uTime; uniform vec3 uC1,uC2;
    void main(){ 
      float d=length(vUv-0.5)*2.0; 
      float wave=sin(uTime*0.8+d*5.0)*0.05;
      float g=exp(-(d+wave)*2.2)*0.16+exp(-(d+wave)*5.0)*0.05;
      g*=0.75+0.25*sin(uTime*0.6+d*3.0); 
      gl_FragColor=vec4(mix(uC1,uC2,d),g); 
    }`,
  transparent:true, depthWrite:false,
});
const glowPlane = new THREE.Mesh(glowGeom, glowMat);
glowPlane.rotation.x = -Math.PI/2; glowPlane.position.y = -3.3;
glowPlane.renderOrder = 999; glowPlane.material.depthTest = false;
scene.add(glowPlane);

// ============================================================================
//  背景粒子
// ============================================================================
const bgParticles = [];
const pGeom = new THREE.SphereGeometry(0.014, 6, 6);
const pColors = ['#ffe0f0','#e0c0ff','#c0d0ff','#ffe8d0','#f8d0ff','#ffd0e0'];
for (let i = 0; i < 70; i++) {
  const mat = new THREE.MeshBasicMaterial({ 
    color:pColors[Math.floor(Math.random()*pColors.length)], 
    transparent:true, opacity:0.2+Math.random()*0.5, depthWrite:false 
  });
  const p = new THREE.Mesh(pGeom, mat);
  const th = Math.random()*Math.PI*2, ph = Math.random()*Math.PI*0.65, r = 4+Math.random()*6;
  p.position.set(Math.cos(th)*Math.sin(ph)*r, (Math.random()-0.5)*6, Math.sin(th)*Math.sin(ph)*r);
  p.userData = { 
    bx:p.position.x, by:p.position.y, bz:p.position.z, 
    sp:0.15+Math.random()*0.5, amp:0.1+Math.random()*0.5, ph:Math.random()*Math.PI*2 
  };
  scene.add(p); bgParticles.push(p);
}

// ============================================================================
//  点击火花效果
// ============================================================================
const sparkles = [];
const sparkleGeom = new THREE.SphereGeometry(0.012, 4, 4);
function burstSparkles(worldPos, count, color) {
  for (let i = 0; i < count; i++) {
    const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:1, depthWrite:false });
    const s = new THREE.Mesh(sparkleGeom, mat);
    s.position.copy(worldPos);
    const dir = new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2).normalize();
    s.userData = { vel: dir.multiplyScalar(0.3+Math.random()*1.2), life:0.6+Math.random()*1.0, age:0 };
    scene.add(s); sparkles.push(s);
  }
}

// ============================================================================
//  飘落花瓣
// ============================================================================
const fallingPetals = [];
function detachPetal(petalData) {
  if (petalData.removed) return;
  petalData.removed = true;
  const worldPos = new THREE.Vector3();
  const worldQuat = new THREE.Quaternion();
  petalData.mesh.getWorldPosition(worldPos);
  petalData.mesh.getWorldQuaternion(worldQuat);
  petalData.pivot.remove(petalData.mesh);
  petalData.mesh.position.copy(worldPos);
  petalData.mesh.quaternion.copy(worldQuat);
  scene.add(petalData.mesh);
  fallingPetals.push({
    mesh: petalData.mesh,
    velocity: new THREE.Vector3((Math.random()-0.5)*0.4, 0.1+Math.random()*0.3, (Math.random()-0.5)*0.4),
    rotVel: new THREE.Vector3((Math.random()-0.5)*2.5, (Math.random()-0.5)*2.5, (Math.random()-0.5)*2.5),
    gravity: -0.25 - Math.random()*0.3,
    life: 3+Math.random()*3, age: 0,
  });
}

// ============================================================================
//  交互处理
// ============================================================================
let totalClicks = 0;
let fullBloomTriggered = false;
const RAYCASTER = new THREE.Raycaster();
const MOUSE = new THREE.Vector2();

function handleClick(clientX, clientY) {
  MOUSE.x = (clientX / innerWidth) * 2 - 1;
  MOUSE.y = -(clientY / innerHeight) * 2 + 1;
  RAYCASTER.setFromCamera(MOUSE, camera);

  const centerHits = RAYCASTER.intersectObject(centerTarget);
  if (centerHits.length > 0) { triggerFullBloom(); return; }

  const petalMeshes = allPetals.filter(p => !p.removed).map(p => p.mesh);
  const hits = RAYCASTER.intersectObjects(petalMeshes);
  if (hits.length > 0) {
    const petalData = allPetals.find(p => p.mesh === hits[0].object && !p.removed);
    if (petalData) triggerPetalBloom(petalData, hits[0].point);
  }
}

// 双击全屏
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

// ============================================================================
//  动画函数
// ============================================================================
function setPetalQuat(pd, tilt) {
  const qt = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), tilt);
  const qd = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), pd.angle);
  pd.pivot.quaternion.multiplyQuaternions(qd, qt);
  pd.currentTilt = tilt;
}
function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t - 1) * (2 * Math.PI) / 0.35) + 1;
}
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function triggerPetalBloom(petalData, worldHitPoint) {
  totalClicks++;
  petalData.tiltTarget = Math.min(petalData.tiltOpen * 1.1, 2.8);
  petalData.tiltAnimFrom = petalData.currentTilt;
  petalData.tiltAnimTo = petalData.tiltTarget;
  petalData.tiltAnimStart = performance.now();
  petalData.tiltAnimDuration = 700 + Math.random() * 300;
  burstSparkles(worldHitPoint, 15, '#ffe8f0');

  // 带动附近花瓣一起绽放
  const layerT = petalData.t;
  allPetals.forEach(p => {
    if (p === petalData || p.removed) return;
    if (Math.abs(p.t - layerT) < 0.06) {
      p.tiltTarget = Math.min(p.tiltOpen * 1.06, 2.7);
      p.tiltAnimFrom = p.currentTilt;
      p.tiltAnimTo = p.tiltTarget;
      p.tiltAnimStart = performance.now();
      p.tiltAnimDuration = 500 + Math.random() * 400;
    }
  });

  // 点击次数足够时花瓣飘落
  if (totalClicks >= 8 && totalClicks % 3 === 0) {
    const outer = allPetals.filter(p => !p.removed && p.t > 0.7);
    if (outer.length > 0) {
      const victim = outer[Math.floor(Math.random() * outer.length)];
      const wp = new THREE.Vector3(); victim.mesh.getWorldPosition(wp);
      burstSparkles(wp, 25, '#ffd0e0');
      setTimeout(() => detachPetal(victim), 300);
    }
  }
  if (totalClicks >= 15 && totalClicks % 5 === 0) showLoveText();
  updateClickCounter();
}

function triggerFullBloom() {
  if (fullBloomTriggered) return;
  fullBloomTriggered = true;
  const sorted = [...allPetals].filter(p => !p.removed).sort((a, b) => b.t - a.t);
  sorted.forEach((p, i) => {
    setTimeout(() => {
      p.tiltTarget = Math.min(p.tiltOpen * 1.08, 2.8);
      p.tiltAnimFrom = p.currentTilt;
      p.tiltAnimTo = p.tiltTarget;
      p.tiltAnimStart = performance.now();
      p.tiltAnimDuration = 900 + Math.random() * 400;
    }, i * 55);
  });
  const cp = new THREE.Vector3(0, -0.05, 0); rose.localToWorld(cp);
  burstSparkles(cp, 50, '#ffe8f0');
  setTimeout(() => burstSparkles(cp.clone(), 35, '#ffd0f0'), 400);
  setTimeout(() => burstSparkles(cp.clone(), 25, '#ffc0e0'), 800);
  updateClickCounter();
}

// ============================================================================
//  UI函数
// ============================================================================
function showLoveText() {
  const el = document.createElement('div');
  el.className = 'love-text';
  el.textContent = ['❤️','✨','💖','🌹','💕','💫'][Math.floor(Math.random()*6)];
  el.style.left = (30+Math.random()*40)+'%';
  el.style.top = (40+Math.random()*30)+'%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
function updateClickCounter() {
  const c = document.getElementById('clickCounter');
  if (totalClicks >= 10) c.textContent = `已点击 ${totalClicks} 次 · 花瓣开始飘落...`;
  else if (totalClicks >= 5) c.textContent = `已点击 ${totalClicks} 次 · 继续点击花瓣吧`;
  else if (totalClicks > 0) c.textContent = `已点击 ${totalClicks} 次`;
  c.style.opacity = totalClicks > 0 ? '1' : '0';
}

// ============================================================================
//  事件监听
// ============================================================================
let targetMouseX = 0, targetMouseY = 0, smoothMouseX = 0, smoothMouseY = 0;
document.addEventListener('mousemove', e => {
  targetMouseX = (e.clientX / innerWidth) * 2 - 1;
  targetMouseY = -(e.clientY / innerHeight) * 2 + 1;
});
document.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    targetMouseX = (e.touches[0].clientX / innerWidth) * 2 - 1;
    targetMouseY = -(e.touches[0].clientY / innerHeight) * 2 + 1;
  }
}, { passive: true });
document.addEventListener('click', e => handleClick(e.clientX, e.clientY));
document.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1) handleClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
});
document.addEventListener('dblclick', toggleFullscreen);

// ============================================================================
//  渲染主循环
// ============================================================================
const BLOOM_DURATION = 5.5;
let initialBloom = 0;
const clock = new THREE.Clock();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const t = clock.getElapsedTime();

  initialBloom = Math.min(1, t / BLOOM_DURATION);
  const ep = easeOutBack(initialBloom);

  // 花瓣绽放与飘动动画（四元数驱动，统一朝上倾斜）
  allPetals.forEach(p => {
    if (p.removed) return;
    const localRaw = Math.max(0, Math.min(1, (ep - p.bloomDelay * 0.25) / 0.75));
    const localInit = easeOutBack(localRaw);
    const baseTilt = p.tiltClosed + (p.tiltOpen - p.tiltClosed) * localInit;

    if (p.tiltAnimDuration > 0) {
      const animElapsed = now - p.tiltAnimStart;
      const animT = Math.min(1, animElapsed / p.tiltAnimDuration);
      const animEased = easeOutElastic(animT);
      const clickTilt = p.tiltAnimFrom + (p.tiltAnimTo - p.tiltAnimFrom) * animEased;
      if (animT >= 1) { setPetalQuat(p, p.tiltAnimTo); p.tiltAnimDuration = 0; }
      else { setPetalQuat(p, Math.max(baseTilt, clickTilt)); }
    } else {
      setPetalQuat(p, baseTilt);
    }

    // 更自然的随风飘动
    const noiseVal = Math.sin(t * 1.2 + p.swayNoiseOff) * Math.cos(t * 0.6 + p.swayNoiseOff * 1.7);
    const localOpen = Math.max(0, (localRaw - 0.5) * 2);
    const sway = noiseVal * p.swayAmp * (0.3 + localOpen * 0.7) * 4;
    p.pivot.rotation.z += sway * 0.3;
  });

  // 花蕊缩放动画
  const sScale = 0.5 + 0.5 * ep;
  stamenGroup.scale.setScalar(sScale);
  stamenGroup.position.y = -0.10 + ep * 0.04;

  // 鼠标跟随轻微晃动
  smoothMouseX += (targetMouseX - smoothMouseX) * 0.03;
  smoothMouseY += (targetMouseY - smoothMouseY) * 0.03;
  rose.rotation.z = smoothMouseX * 0.04;
  rose.rotation.x = -smoothMouseY * 0.03;
  // 整体随风轻微摆动
  rose.rotation.y = Math.sin(t * 0.15) * 0.006;

  // 火花更新
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.userData.age += dt;
    if (s.userData.age >= s.userData.life) { scene.remove(s); s.material.dispose(); sparkles.splice(i, 1); }
    else {
      const prog = s.userData.age / s.userData.life;
      s.position.x += s.userData.vel.x * dt;
      s.position.y += s.userData.vel.y * dt;
      s.position.z += s.userData.vel.z * dt;
      s.userData.vel.y += 0.1 * dt;
      s.material.opacity = 1 - prog;
      s.scale.setScalar(1 - prog * 0.6);
    }
  }

  // 飘落花瓣更新
  for (let i = fallingPetals.length - 1; i >= 0; i--) {
    const fp = fallingPetals[i];
    fp.age += dt;
    if (fp.age > fp.life) { scene.remove(fp.mesh); fp.mesh.material.dispose(); fp.mesh.geometry.dispose(); fallingPetals.splice(i, 1); }
    else {
      fp.velocity.y += fp.gravity * dt;
      fp.mesh.position.x += fp.velocity.x * dt;
      fp.mesh.position.y += fp.velocity.y * dt;
      fp.mesh.position.z += fp.velocity.z * dt;
      fp.mesh.rotation.x += fp.rotVel.x * dt;
      fp.mesh.rotation.y += fp.rotVel.y * dt;
      fp.mesh.rotation.z += fp.rotVel.z * dt;
      if (fp.age / fp.life > 0.6) fp.mesh.material.opacity = Math.max(0, fp.mesh.material.opacity - dt * 0.5);
    }
  }

  controls.update();
  glowMat.uniforms.uTime.value = t;

  // 背景粒子浮动
  bgParticles.forEach(p => {
    const d = p.userData;
    p.position.x = d.bx + Math.sin(t * d.sp + d.ph) * d.amp;
    p.position.y = d.by + Math.cos(t * d.sp * 0.65 + d.ph) * d.amp * 0.7;
    p.position.z = d.bz + Math.cos(t * d.sp * 0.55 + d.ph) * d.amp * 0.6;
  });

  // 灯光呼吸效果
  bottomLight.intensity = 4.5 + Math.cos(t * 0.4) * 1.2;
  spotLight.intensity = 18 + Math.sin(t * 0.3) * 3;
  centerLight.intensity = 0.7 + Math.sin(t * 0.5) * 0.25;

  composer.render();
}

// ============================================================================
//  启动
// ============================================================================
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    document.getElementById('overlay').classList.add('hidden');
    document.querySelector('.title').classList.add('visible');
    document.querySelector('.sub').classList.add('visible');
    document.querySelector('.hint').classList.add('visible');
    setTimeout(() => { const ov = document.getElementById('overlay'); if (ov) ov.remove(); }, 2000);
  });
});

requestAnimationFrame(animate);

// 窗口大小调整
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// 快捷键
window.addEventListener('keydown', (e) => {
  switch (e.key.toLowerCase()) {
    case 'r': camera.position.set(0, 0.8, 7.5); controls.target.set(0, 0.05, 0); controls.update(); break;
    case 'f': camera.position.set(0, 0.5, 6); controls.target.set(0, 0, 0); controls.update(); break;
    case 't': camera.position.set(0, 7, 0.5); controls.target.set(0, 0, 0); controls.update(); break;
    case 'b': fullBloomTriggered = false; triggerFullBloom(); break;
    case ' ': e.preventDefault(); toggleFullscreen(); break;
  }
});

console.log('🌹 水晶玫瑰 — 点击花瓣绽放 | 点击花心全开 | 拖拽旋转 | 滚轮缩放 | 双击全屏');
console.log('⌨️ 快捷键: R=重置视角 | F=正面视角 | T=顶部视角 | B=一键全开 | 空格=全屏');
